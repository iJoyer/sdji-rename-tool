# 文件重命名规则配置（此文件本身不会执行重命名）
# 参数名使用英文，注释使用中文。

scope:
  # 是否递归处理子目录
  recursive: true
  # 是否包含文件夹名（当前仅建议处理文件）
  include_directories: false

file_types:
  # 仅处理图片文件（扩展名不区分大小写）
  image_extensions:
    - jpg
    - jpeg
    - png
    - webp
    - avif
    - heic
    - heif
    - tif
    - tiff
    - raw
    - dng
    - cr2
    - cr3
    - nef
    - arw
    - raf
    - orf
    - rw2

dji_rules:
  # 是否启用 DJI 文件名规则
  enabled: true
  # 仅匹配此前缀开头的文件
  starts_with: "DJI"
  # 说明：
  # - 时间戳删除仅对 starts_with 命中的文件生效（例如 DJI）
  # - 词表清理（remove_markers/keep_markers）对所有匹配图片文件生效

  # 删除中间日期/时间戳，例如：
  # DJI_20250917051539_0240_D_Pre.JPG -> DJI_0240_D_Pre.JPG
  remove_middle_timestamp: true
  # 仅匹配 DJI 文件头后紧跟的时间戳段（更安全，避免误删其他数字）
  timestamp_must_follow_prefix: true
  timestamp_patterns:
    - "yyyyMMdd"        # 8位
    - "yyyyMMddHHmmss"  # 14位

  # 词表（固定写法：所有词都带分隔符前缀，仅支持 "_" 或 "-"）
  # 保留词：命中时不触发删除，例如 "-T"、"-L"
  keep_markers:
    - "-T"
    - "-L"
  # 删除词：命中时按规则删除，例如 "-HDR"、"-EDIT"、"_D"
  remove_markers:
    - "_D"
    - "-D"
    - "-HDR"
    - "-EDIT"
    - "-Enhanced"
    - "-NR"
    - "-SR"

  # 命中 remove_markers 时的应用方式
  # 1) "_" 标记：删除命中的单个下划线分段（例：_D）
  remove_underscore_markers: true
  # 2) "-" 标记：若尾部连字符链命中删除词（且不在保留词），删除整段编辑链
  remove_trailing_hyphen_chain_on_marker_hit: true
  # 是否先移除原始文件名末尾的 -数字（如 _Pre-2 -> _Pre）
  remove_existing_trailing_dash_number: true

conflict_resolution:
  # 目标文件名已存在时：
  # DJI_0001.JPG -> DJI_0001-2.JPG -> DJI_0001-3.JPG ...
  strategy: "append_dash_index"
  # 冲突后缀起始编号（设为 2 表示不使用 -1）
  start_index: 2

execution:
  # true=仅预览，不实际改名
  dry_run: false
  # 是否输出改名日志
  create_rename_log: yes
  # 改名日志文件名（建议放 /tmp，方便 undo-last 在不同目录执行）
  rename_log_file: "/tmp/pic-rename/rename_log.csv"
